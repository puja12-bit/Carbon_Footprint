kind = "web"
previewPath = "/"
title = "Carbon Copilot AI"
version = "1.0.0"
id = "artifacts/carbon-copilot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18966

[services.development]
run = "pnpm --filter @workspace/carbon-copilot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/carbon-copilot", "run", "build" ]
publicDir = "artifacts/carbon-copilot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18966"
BASE_PATH = "/"
